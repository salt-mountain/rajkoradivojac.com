name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# A newer push to the same branch/PR cancels the stale, still-running CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # setup-bun caches the Bun binary, not packages; cache the install cache too.
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Typecheck Functions
        run: bun run typecheck:functions

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
