name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# A newer push to the same branch/PR cancels the stale, still-running CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        # Bun version comes from .bun-version (pinned), not "latest".

      # setup-bun caches the Bun binary, not packages; cache the install cache too.
      - name: Cache Bun install cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Typecheck Functions
        run: bun run typecheck:functions

      - name: Typecheck (Astro)
        run: bun run check

      - name: Format check
        run: bun run format:check

      # The CDK infra app has its own bun.lock / tsconfig — typecheck it too.
      - name: Install infra deps
        run: bun install --frozen-lockfile
        working-directory: infra
      - name: Typecheck infra
        run: bun run typecheck
        working-directory: infra

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
