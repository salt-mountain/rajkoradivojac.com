name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

# Cloudflare auth comes from the CLOUDFLARE_API_TOKEN secret, not GITHUB_TOKEN,
# so the workflow token only needs read access to the repo.
permissions:
  contents: read

# Serialize deploys; do NOT cancel an in-flight one (cancelling mid
# `wrangler pages deploy` could leave a partial deploy).
concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Reads wrangler.toml: project name, pages_build_output_dir (dist),
          # Functions, D1/vars bindings. Don't pass a dir arg alongside
          # pages_build_output_dir — wrangler errors on both.
          command: pages deploy
