name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

# Cloudflare auth comes from the CLOUDFLARE_API_TOKEN secret, not GITHUB_TOKEN,
# so the workflow token only needs read access to the repo.
permissions:
  contents: read

# Serialize deploys; do NOT cancel an in-flight one (cancelling mid
# `wrangler pages deploy` could leave a partial deploy).
concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Reads wrangler.toml: project name, pages_build_output_dir (dist),
          # Functions, D1/vars bindings. Don't pass a dir arg alongside
          # pages_build_output_dir — wrangler errors on both.
          command: pages deploy
