name: Dependency Review

# Fails a PR that introduces a dependency with a known high-severity vulnerability.
# High-signal here since Dependabot opens many dependency PRs.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # post the findings as a PR comment

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
