name: Dependency Review

# Fails a PR that introduces a dependency with a known high-severity vulnerability.
# High-signal here since Dependabot opens many dependency PRs.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # post the findings as a PR comment

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
