name: Dependency Review

# Fails a PR that introduces a dependency with a known high-severity vulnerability.
# High-signal here since Dependabot opens many dependency PRs.
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
